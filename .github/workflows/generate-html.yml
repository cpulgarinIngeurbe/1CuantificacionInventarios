name: Generar HTML

on:
  push:
    branches:
      - main
    paths:
      - 'transformacion/InformeInventario_Unificado.xlsx'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-html:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl

      - name: Ejecutar script de HTML
        run: python generate_html.py

      - name: Configurar Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Commit HTML
        run: |
          if git diff --exit-code index.html > /dev/null 2>&1; then
            echo "Sin cambios en el archivo"
          else
            git add index.html
            git commit -m "chore: actualizar index.html

- Generado automaticamente desde transformacion/InformeInventario_Unificado.xlsx
- Tabla actualizada con los datos consolidados"
          fi

      - name: Pull y Push
        run: |
          git pull origin ${{ github.ref_name }} --rebase || true
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref_name }} || echo "No hay cambios para pushear"
