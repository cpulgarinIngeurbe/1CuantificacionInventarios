name: Generar HTML

on:
  workflow_run:
    workflows: ["Unificar Pestañas Excel"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-html:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl

      - name: Esperar a que el archivo exista
        run: |
          for i in {1..30}; do
            if [ -f "transformacion/InformeInventario_Unificado.xlsx" ]; then
              echo "Archivo encontrado"
              exit 0
            fi
            echo "Intento $i/30: esperando archivo..."
            sleep 2
          done
          echo "Archivo no encontrado después de 60 segundos"
          exit 1

      - name: Ejecutar script de HTML
        run: python generate_html.py

      - name: Configurar Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Commit HTML
        run: |
          if git diff --exit-code index.html > /dev/null 2>&1; then
            echo "Sin cambios en el archivo"
          else
            git add index.html
            git commit -m "chore: actualizar index.html" \
              -m "Generado automaticamente desde transformacion/InformeInventario_Unificado.xlsx" \
              -m "Tabla actualizada con los datos consolidados"
          fi

      - name: Pull y Push
        run: |
          git pull origin ${{ github.ref }} --rebase || true
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref }} || echo "No hay cambios para pushear"
