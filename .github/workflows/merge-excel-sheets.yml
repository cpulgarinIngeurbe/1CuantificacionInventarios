name: Unificar Pestañas Excel

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'datos/InformeInventario.xlsx'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  merge-sheets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl

      - name: Ejecutar script de unificación
        run: python merge_sheets.py

      - name: Mostrar resultado
        run: |
          echo "✓ Archivo procesado exitosamente"
          echo "Ruta: transformacion/InformeInventario_Unificado.xlsx"
