name: Unificar Pestañas Excel

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'InformeInventario.xlsx'
  workflow_dispatch:

jobs:
  merge-sheets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl

      - name: Ejecutar script de unificación
        run: python merge_sheets.py

      - name: Verificar cambios
        id: verify
        run: |
          if git diff --exit-code InformeInventario.xlsx > /dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Configurar Git
        if: steps.verify.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Commit cambios
        if: steps.verify.outputs.changed == 'true'
        run: |
          git add InformeInventario.xlsx
          git commit -m "chore: unificar pestañas de Excel en DATOS_UNIFICADOS" \
            -m "- Todas las 12 pestañas han sido consolidadas en una sola pestaña" \
            -m "- Validacion exitosa: todas las pestañas tenian las mismas columnas" \
            -m "- Actualizacion automatica por GitHub Actions"

      - name: Push cambios
        if: steps.verify.outputs.changed == 'true'
        run: |
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref_name }}
