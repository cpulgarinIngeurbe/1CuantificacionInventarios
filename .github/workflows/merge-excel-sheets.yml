name: Unificar Pestañas Excel

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'datos/InformeInventario.xlsx'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  merge-sheets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl

      - name: Ejecutar script de unificación
        run: python merge_sheets.py

      - name: Configurar Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Commit resultado
        run: |
          if git diff --exit-code transformacion/InformeInventario_Unificado.xlsx > /dev/null 2>&1; then
            echo "Sin cambios en el archivo"
          else
            git add transformacion/InformeInventario_Unificado.xlsx
            git commit -m "chore: actualizar datos unificados" \
              -m "Generado automaticamente por merge_sheets.py"
          fi

      - name: Pull y Push
        run: |
          git pull origin ${{ github.ref_name }} --rebase || true
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref_name }} || echo "No hay cambios para pushear"
